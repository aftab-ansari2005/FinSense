version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: finsense-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: finsense
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - finsense-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finsense-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - MONGODB_URI=mongodb://admin:password@mongodb:27017/finsense?authSource=admin
      - ML_SERVICE_URL=http://ml-service:5001
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - mongodb
      - ml-service
    networks:
      - finsense-network

  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: finsense-ml-service
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      - FLASK_ENV=development
      - MONGODB_URI=mongodb://admin:password@mongodb:27017/finsense?authSource=admin
    volumes:
      - ./ml-service:/app
      - ml_models:/app/models
    depends_on:
      - mongodb
    networks:
      - finsense-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: finsense-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:5000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - finsense-network

volumes:
  mongodb_data:
  ml_models:

networks:
  finsense-network:
    driver: bridge